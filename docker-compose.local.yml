services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatgpt2api:local
    container_name: chatgpt2api-local
    ports:
      - "8000:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
      # 不要默认挂载 ./gpt_free_register：宿主机若缺目录，Docker 会挂空目录盖掉镜像内文件。
      # 本地改注册机时再手动打开：
      # - ./gpt_free_register:/app/gpt_free_register:ro
    environment:
      STORAGE_BACKEND: sqlite
      DATABASE_URL: sqlite:////app/data/accounts.db
      # 注册机内部 sqlite（避免写只读镜像层）
      REGISTER_ENGINES_DATABASE_URL: sqlite:////app/data/register_engines.db
      # GPT free register secrets: put CFD1_* / REGISTER_PROXY* in data/gpt_register.env
      # or export them here, e.g.:
      # CFD1_API_TOKEN: ${CFD1_API_TOKEN:-}
      # CFD1_ACCOUNT_ID: ${CFD1_ACCOUNT_ID:-}
      # CFD1_DATABASE_ID: ${CFD1_DATABASE_ID:-}
      # CFD1_DOMAIN: ${CFD1_DOMAIN:-}
      # REGISTER_PROXY_DEFAULT: ${REGISTER_PROXY_DEFAULT:-}
    # 存储后端配置 (可选值: json, sqlite, postgres, git)
    # environment:
    #   STORAGE_BACKEND: json

    # 数据库配置 (当 STORAGE_BACKEND=sqlite/postgres 时使用)
    #   DATABASE_URL: postgresql://user:password@host:5432/dbname
    #   DATABASE_URL: sqlite:////app/data/accounts.db

    # Git 仓库配置 (当 STORAGE_BACKEND=git 时使用)
    #   GIT_REPO_URL: https://github.com/user/repo.git
    #   GIT_TOKEN: ghp_xxxxxxxxxxxx
    #   GIT_BRANCH: main
    #   GIT_FILE_PATH: accounts.json

    # 认证密钥 (可选，覆盖 config.json)
    #   CHATGPT2API_AUTH_KEY: your_secret_key

    # 基础 URL (可选)
    #   CHATGPT2API_BASE_URL: https://your-domain.com
